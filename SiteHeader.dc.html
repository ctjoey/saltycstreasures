<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Yellowtail&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
    @keyframes sct-fade-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</helmet>
<div style="font-family: 'Work Sans', sans-serif;">
  <div style="background:#1C3A56; color:#F3ECDC; text-align:center; font-size:13px; letter-spacing:0.06em; padding:8px 16px;">
    Handmade to order in Fort Pierce, FL &nbsp;•&nbsp; Free shipping over $65
  </div>
  <header style="position:sticky; top:0; z-index:50; background:#FAF6EC; border-bottom:1px solid #E4D9C2; display:flex; align-items:center; justify-content:space-between; padding:14px 32px;">
    <a href="Home.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <img src="assets/logo.png" alt="Salty C's Treasures" style="width:56px; height:56px; object-fit:contain;" />
      <span style="font-family:'Yellowtail', cursive; font-size:30px; font-weight:400; color:#1C3A56; letter-spacing:0.01em;">Salty C's Treasures</span>
    </a>
    <nav style="{{ navStyle }}">
      <a href="Home.dc.html" style="{{ linkStyle.home }}">Home</a>
      <a href="Shop.dc.html" style="{{ linkStyle.shop }}">Shop</a>
      <a href="CustomOrder.dc.html" style="{{ linkStyle.custom }}">Custom Orders</a>
      <a href="About.dc.html" style="{{ linkStyle.about }}">About</a>
      <a href="Contact.dc.html" style="{{ linkStyle.contact }}">Contact</a>
    </nav>
    <div style="display:flex; align-items:center; gap:14px;">
      <button onClick="{{ onCartClick }}" style="position:relative; background:none; border:none; cursor:pointer; padding:8px; color:#1C3A56;" aria-label="Cart">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1C3A56" stroke-width="1.6"><path d="M3 4h2l2.4 12.4a2 2 0 0 0 2 1.6h7.7a2 2 0 0 0 2-1.6L21 8H6"/><circle cx="9.5" cy="20.5" r="1.4" fill="#1C3A56"/><circle cx="17.5" cy="20.5" r="1.4" fill="#1C3A56"/></svg>
        <sc-if value="{{ cartCountPositive }}">
          <span style="position:absolute; top:2px; right:2px; background:#B98D4A; color:#FAF6EC; font-size:10px; font-weight:600; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;">{{ cartCount }}</span>
        </sc-if>
      </button>
      <button onClick="{{ toggleMobile }}" style="{{ hamburgerStyle }}" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1C3A56" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </header>
  <sc-if value="{{ mobileOpen }}">
    <div style="animation:sct-fade-in 0.15s ease; background:#FAF6EC; border-bottom:1px solid #E4D9C2; padding:8px 24px 18px; display:flex; flex-direction:column; gap:2px;">
      <a href="Home.dc.html" style="{{ mobileLinkStyle.home }}">Home</a>
      <a href="Shop.dc.html" style="{{ mobileLinkStyle.shop }}">Shop</a>
      <a href="CustomOrder.dc.html" style="{{ mobileLinkStyle.custom }}">Custom Orders</a>
      <a href="About.dc.html" style="{{ mobileLinkStyle.about }}">About</a>
      <a href="Contact.dc.html" style="{{ mobileLinkStyle.contact }}">Contact</a>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1400, &quot;height&quot;: 130}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;,&quot;shop&quot;,&quot;custom&quot;,&quot;about&quot;,&quot;contact&quot;]}, &quot;cartCount&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 0, &quot;tsType&quot;: &quot;number&quot;}, &quot;onCartClick&quot;: {&quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { isMobile: false, mobileOpen: false };

  componentDidMount() {
    this.mq = window.matchMedia('(max-width: 880px)');
    this.updateMq = () => this.setState({ isMobile: this.mq.matches, mobileOpen: this.mq.matches ? this.state.mobileOpen : false });
    this.updateMq();
    this.mq.addEventListener('change', this.updateMq);
  }

  componentWillUnmount() {
    if (this.mq) this.mq.removeEventListener('change', this.updateMq);
  }

  renderVals() {
    const active = this.props.active ?? 'home';
    const base = { color: '#1C3A56', textDecoration: 'none', fontSize: '15px', fontWeight: 500, letterSpacing: '0.01em', padding: '6px 2px' };
    const activeStyle = { ...base, fontWeight: 700, borderBottom: '2px solid #B98D4A' };
    const mk = (key) => (active === key ? activeStyle : base);
    const mobileBase = { ...base, fontSize: '17px', padding: '10px 4px', borderBottom: '1px solid #EFE7D6' };
    const mobileActive = { ...mobileBase, fontWeight: 700, color: '#B98D4A' };
    const mkMobile = (key) => (active === key ? mobileActive : mobileBase);

    return {
      cartCount: this.props.cartCount ?? 0,
      cartCountPositive: (this.props.cartCount ?? 0) > 0,
      onCartClick: this.props.onCartClick ?? (() => {}),
      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),
      mobileOpen: this.state.mobileOpen,
      navStyle: { display: this.state.isMobile ? 'none' : 'flex', gap: '28px', alignItems: 'center' },
      hamburgerStyle: { display: this.state.isMobile ? 'flex' : 'none', background: 'none', border: 'none', cursor: 'pointer', padding: '8px' },
      linkStyle: { home: mk('home'), shop: mk('shop'), custom: mk('custom'), about: mk('about'), contact: mk('contact') },
      mobileLinkStyle: { home: mkMobile('home'), shop: mkMobile('shop'), custom: mkMobile('custom'), about: mkMobile('about'), contact: mkMobile('contact') },
    };
  }
}

</script>
</body>
</html>
