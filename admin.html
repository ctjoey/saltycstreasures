<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Editor — Salty C's Treasures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #FAF6EC; font-family: 'Work Sans', sans-serif; color: #2A2A28; }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 32px; }
  h1 { font-family: 'Cormorant Garamond', serif; color: #1C3A56; font-size: 32px; margin: 0 0 6px; }
  .sub { color: #7A7264; font-size: 14px; margin: 0 0 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
  .card { background: #fff; border: 1px solid #E4D9C2; border-radius: 12px; padding: 18px; }
  .dropzone { width: 100%; aspect-ratio: 1/1; border-radius: 10px; border: 2px dashed #C9A15C; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; color: #A69C87; padding: 12px; margin-bottom: 12px; cursor: pointer; position: relative; }
  .dropzone.drag-over { border-color: #1C3A56; background-color: #F3ECDC; }
  .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .cat { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #B98D4A; font-weight: 600; margin-bottom: 6px; }
  label { font-size: 12px; color: #7A7264; display: block; margin: 10px 0 4px; }
  input[type=text], input[type=number] { width: 100%; padding: 10px; border: 1px solid #D8CBAA; border-radius: 4px; font-size: 14px; font-family: 'Work Sans', sans-serif; }
  .saved-tag { font-size: 11px; color: #4C8C8A; font-weight: 600; margin-top: 8px; height: 14px; }
  .back { display: inline-block; margin-bottom: 20px; font-size: 14px; color: #1C3A56; text-decoration: none; }
  .back:hover { color: #B98D4A; }
  .reset-btn { font-size: 12px; color: #B15C5C; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← Back to site</a>
  <h1>Product Editor</h1>
  <p class="sub">Drag &amp; drop an image onto a card (or click to choose a file), then edit the name and price. Changes save automatically in this browser and appear on Home and Shop.</p>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
  import { PRODUCTS } from './assets/products.js';
  import { getOverrides, saveOverride } from './assets/product-store.js';

  const grid = document.getElementById('grid');

  function render() {
    const overrides = getOverrides();
    grid.innerHTML = '';
    PRODUCTS.forEach(base => {
      const p = { ...base, ...overrides[base.id] };
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="dropzone" id="drop-${p.id}" style="${p.image ? `background-image:url('${p.image}')` : `background-color:${p.hue}`}">
          ${p.image ? '' : 'Drop an image here<br>or click to choose'}
          <input type="file" accept="image/*" id="file-${p.id}">
        </div>
        <div class="cat">${p.category}</div>
        <label>Product name</label>
        <input type="text" id="name-${p.id}" value="${p.name}">
        <label>Price ($)</label>
        <input type="number" id="price-${p.id}" value="${p.price}" min="0" step="0.01">
        <div class="saved-tag" id="saved-${p.id}"></div>
        <button class="reset-btn" id="reset-${p.id}">Reset to default</button>
      `;
      grid.appendChild(card);

      const dz = card.querySelector(`#drop-${p.id}`);
      const fileInput = card.querySelector(`#file-${p.id}`);
      const nameInput = card.querySelector(`#name-${p.id}`);
      const priceInput = card.querySelector(`#price-${p.id}`);
      const savedTag = card.querySelector(`#saved-${p.id}`);
      const resetBtn = card.querySelector(`#reset-${p.id}`);

      function flash() {
        savedTag.textContent = 'Saved ✓';
        clearTimeout(savedTag._t);
        savedTag._t = setTimeout(() => savedTag.textContent = '', 1200);
      }

      function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
          saveOverride(p.id, { image: reader.result });
          dz.style.backgroundImage = `url('${reader.result}')`;
          dz.textContent = '';
          flash();
        };
        reader.readAsDataURL(file);
      }

      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
      dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('drag-over');
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

      nameInput.addEventListener('change', () => { saveOverride(p.id, { name: nameInput.value }); flash(); });
      priceInput.addEventListener('change', () => { saveOverride(p.id, { price: parseFloat(priceInput.value) || 0 }); flash(); });
      resetBtn.addEventListener('click', () => { saveOverride(p.id, { image: undefined, name: base.name, price: base.price }); render(); });
    });
  }

  render();
</script>
</body>
</html>
